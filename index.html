<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />

  <link rel="icon" type="image/png" href="/img/logos/IMG_5208.PNG" />

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- 🔥 PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />

  <title>Index Genius Academy</title>

  <!-- 🔥 OneSignal SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <!-- 🔥 CONFIGURACIÓN COMPLETA -->
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function (OneSignal) {

      await OneSignal.init({
        appId: "76180fcf-b0a7-4ac9-a1d6-f06af63e67b2",

        // 🔔 BOTÓN FLOTANTE
        notifyButton: {
          enable: true,
          size: 'large',
          position: 'bottom-right',
          offset: {
            bottom: '20px',
            right: '20px'
          },
          showCredit: false,
          text: {
            'tip.state.unsubscribed': 'Activar señales 🔔',
            'tip.state.subscribed': 'Señales activas ✅',
            'tip.state.blocked': 'Bloqueadas ❌'
          }
        },

        // 🚀 POPUP AUTOMÁTICO (CLAVE)
        promptOptions: {
          slidedown: {
            enabled: true,
            autoPrompt: true,
            timeDelay: 2,
            pageViews: 1
          }
        },

        autoRegister: true,
        allowLocalhostAsSecureOrigin: true,

        serviceWorkerPath: "/OneSignalSDKWorker.js",
        serviceWorkerUpdaterPath: "/OneSignalSDKUpdaterWorker.js",
      });

      console.log("✅ OneSignal ACTIVADO");

      // 🔥 FORZAR PERMISO
      const permission = await OneSignal.Notifications.permission;

      if (permission !== "granted") {
        console.log("🚀 Forzando permisos...");
        await OneSignal.Notifications.requestPermission();
      } else {
        await OneSignal.User.PushSubscription.optIn();
        const playerId = await OneSignal.User.PushSubscription.id;
        console.log("📱 PLAYER ID:", playerId);
      }

      // 🏷️ TAG USUARIO
      const email = localStorage.getItem("dn_academy_email");

      if (email) {
        try {
          await OneSignal.User.addTag("email", email);
          console.log("🏷️ Tag agregado:", email);
        } catch (e) {
          console.log("Tag error:", e);
        }
      }

    });
  </script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
