  <!-- OneSignal SDK (Official Setup) -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function (OneSignal) {
      await OneSignal.init({
        appId: "04046e2f-a035-4a88-9842-147cf501c938",
        safari_web_id: "web.onesignal.auto.44737891-769a-4856-a052-0f3c94719003",
        notifyButton: {
          enable: true
        },
        allowLocalhostAsSecureOrigin: true
      });

      // Auto-tag users when they login
      // This listens for user email stored in localStorage
      let lastTaggedEmail = null; // Track the last email we tagged to avoid redundant calls

      const checkAndTagUser = async () => {
        const userEmail = localStorage.getItem('dn_academy_email');

        // Only tag if we have an email AND it's different from the last one we tagged
        if (userEmail && userEmail !== lastTaggedEmail) {
          console.log('🏷️ [OneSignal] Tagging user with email:', userEmail);
          try {
            await OneSignal.User.addTag('email', userEmail);
            lastTaggedEmail = userEmail; // Remember this email
            console.log('✅ [OneSignal] User tagged successfully');
          } catch (err) {
            console.error('❌ [OneSignal] Failed to tag user:', err);
          }
        }
      };

      // Check immediately
      checkAndTagUser();

      // Also check when storage changes (e.g., after login)
      window.addEventListener('storage', checkAndTagUser);

      // Check periodically ALWAYS (every 5 seconds) to catch any email changes
      setInterval(() => {
        checkAndTagUser();
      }, 5000); // Check every 5 seconds continuously

      console.log('🔔 [OneSignal] Continuous email monitoring active');
    });
  </script>


</head>

<body>
  <div id="root"></div>
