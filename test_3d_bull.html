<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical 3D Bull Test</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* Tactical Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background:
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 2;
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 50%, black 100%);
            z-index: 3;
        }

        .hud-text {
            position: absolute;
            color: #ff0000;
            z-index: 4;
            font-weight: bold;
            opacity: 0.7;
        }

        .top-left {
            top: 20px;
            left: 20px;
        }

        .bottom-right {
            bottom: 20px;
            right: 20px;
            text-align: right;
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>
    <div class="overlay"></div>
    <div class="vignette"></div>

    <div class="hud-text top-left">
        SYSTEM: ONLINE<br>
        TARGET: BULL_v4
    </div>
    <div class="hud-text bottom-right">
        RENDER: THREE.JS<br>
        FPS: 60
    </div>

    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // Setup Scene
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.002);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xff0000, 2, 100);
        pointLight.position.set(2, 3, 4);
        scene.add(pointLight);

        const blueLight = new THREE.PointLight(0x0000ff, 1, 100);
        blueLight.position.set(-2, 1, 4);
        scene.add(blueLight);

        // Bull Texture Plane (Simulating 3D Object)
        const loader = new THREE.TextureLoader();
        let bullMesh;

        // Particles System
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 700;
        const posArray = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i++) {
            // Spread particles
            posArray[i] = (Math.random() - 0.5) * 15;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.02,
            color: 0xff0000,
            transparent: true,
            opacity: 0.8,
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // Load Image
        loader.load('public/img/toro3d/tactical_bull.png', function (texture) {
            const geometry = new THREE.PlaneGeometry(4, 3); // Aspect ratio approximate
            const material = new THREE.MeshStandardMaterial({
                map: texture,
                transparent: true,
                side: THREE.DoubleSide,
                roughness: 0.4,
                metalness: 0.6
            });
            bullMesh = new THREE.Mesh(geometry, material);
            scene.add(bullMesh);

            // Add a subtle "frame" behind it for depth
            const frameGeo = new THREE.WireframeGeometry(new THREE.BoxGeometry(4.2, 3.2, 0.5));
            const frameMat = new THREE.LineBasicMaterial({ color: 0xff0000, opacity: 0.2, transparent: true });
            const frame = new THREE.LineSegments(frameGeo, frameMat);
            scene.add(frame);
        });

        // Grid Floor
        const gridHelper = new THREE.GridHelper(20, 20, 0xff0000, 0x222222);
        gridHelper.position.y = -2;
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Mouse Interaction
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;

            if (bullMesh) {
                // Gentle breathing scale
                const scale = 1 + Math.sin(elapsedTime * 2) * 0.02;
                bullMesh.scale.set(scale, scale, 1);

                // Parallax rotation
                bullMesh.rotation.y += 0.05 * (targetX - bullMesh.rotation.y);
                bullMesh.rotation.x += 0.05 * (targetY - bullMesh.rotation.x);
            }

            // Rotate particles
            particlesMesh.rotation.y = elapsedTime * 0.05;
            particlesMesh.rotation.x = mouseY * 0.0001;

            renderer.render(scene, camera);
        }

        animate();

        // Responsive
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
