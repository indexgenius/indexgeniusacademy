<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <style>
        /* HACK PARA GMAIL: Forzar fondo negro incluso en modo claro/oscuro */
        u+.body {
            background-image: url('https://dummyimage.com/600x1200/000000/000000') !important;
        }

        /* Evitar que Gmail aclare u oscurezca los colores */
        @media (prefers-color-scheme: dark) {
            .text-force-white {
                color: #ffffff !important;
            }

            .text-force-gold {
                color: #FFD700 !important;
            }

            .text-force-cyan {
                color: #00FFFF !important;
            }
        }

        /* Selectores específicos para el motor de Gmail */
        [data-ogsc] .text-force-white {
            color: #ffffff !important;
        }

        [data-ogsc] .text-force-gold {
            color: #FFD700 !important;
        }

        [data-ogsc] .text-force-cyan {
            color: #00FFFF !important;
        }
    </style>
</head>

<body class="body" style="margin:0; padding:0; background-color:#000000; color:#ffffff;">

    <table width="100%" cellpadding="0" cellspacing="0" border="0"
        background="https://dummyimage.com/600x2000/000000/000000"
        style="background-color:#000000; background-image: url('https://dummyimage.com/600x2000/000000/000000'); background-size: cover; background-repeat: repeat; width:100% !important;">
        <tr>
            <td align="center" style="padding: 40px 0;">

                <!-- CONTENEDOR PRINCIPAL -->
                <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; width:100%;">
                    <tr>
                        <td align="center" style="padding:40px; font-family:Arial, sans-serif;">

                            <h1 class="text-force-gold"
                                style="color:#FFD700 !important; margin:0; font-style: italic; font-weight: 900; text-transform: uppercase; font-size: 38px; line-height: 1.1;">
                                TEST DE COLORES ELITE 💎
                            </h1>

                            <p class="text-force-white"
                                style="color:#ffffff !important; font-size: 18px; margin-top: 25px; font-weight: bold; line-height: 1.4;">
                                Probando combinaciones para el look más <span class="text-force-cyan"
                                    style="color:#00FFFF !important;">Premium</span>.
                            </p>

                            <!-- OPCIÓN 1: ORO -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0"
                                background="https://dummyimage.com/600x150/000000/000000"
                                style="margin-top: 40px; background-color: #000000; border-left: 4px solid #FFD700;">
                                <tr>
                                    <td style="padding: 20px;">
                                        <p class="text-force-gold"
                                            style="color:#FFD700 !important; font-weight: 900; margin: 0; letter-spacing: 3px; font-size: 14px; text-transform: uppercase;">
                                            VARIANTE: GOLD ELITE
                                        </p>
                                        <p class="text-force-white"
                                            style="color:#ffffff !important; font-size: 12px; margin-top: 5px;">Ideal
                                            para planes de por vida.</p>
                                    </td>
                                </tr>
                            </table>

                            <!-- OPCIÓN 2: CYAN / NEON -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0"
                                background="https://dummyimage.com/600x150/000000/000000"
                                style="margin-top: 20px; background-color: #000000; border-left: 4px solid #00FFFF;">
                                <tr>
                                    <td style="padding: 20px;">
                                        <p class="text-force-cyan"
                                            style="color:#00FFFF !important; font-weight: 900; margin: 0; letter-spacing: 3px; font-size: 14px; text-transform: uppercase;">
                                            VARIANTE: NEON CYBER
                                        </p>
                                        <p class="text-force-white"
                                            style="color:#ffffff !important; font-size: 12px; margin-top: 5px;">Look
                                            tecnológico y moderno.</p>
                                    </td>
                                </tr>
                            </table>

                            <!-- BOTONES DE PRUEBA -->
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100% "
                                style="margin-top: 40px;">
                                <tr>
                                    <td align="center" bgcolor="#FFD700"
                                        style="background-color:#FFD700 !important; padding: 20px;">
                                        <a href="#"
                                            style="color:#000000 !important; text-decoration:none; font-weight:900; text-transform:uppercase; letter-spacing:3px; font-size:14px; display:block; width:100%;">
                                            BOTÓN ORO (ORO/NEGRO)
                                        </a>
                                    </td>
                                </tr>
                            </table>

                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100% "
                                style="margin-top: 15px;">
                                <tr>
                                    <td align="center" bgcolor="#00FFFF"
                                        style="background-color:#00FFFF !important; padding: 20px;">
                                        <a href="#"
                                            style="color:#000000 !important; text-decoration:none; font-weight:900; text-transform:uppercase; letter-spacing:3px; font-size:14px; display:block; width:100%;">
                                            BOTÓN CYAN (CYAN/NEGRO)
                                        </a>
                                    </td>
                                </tr>
                            </table>

                            <p class="text-force-white"
                                style="color:#333333 !important; font-size: 10px; margin-top: 40px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold;">
                                ¿Cuál de estos resalta más en tu móvil?
                            </p>

                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

</body>

</html>
