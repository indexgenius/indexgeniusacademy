<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <style>
        /* HACK PARA GMAIL: Forzar fondo negro incluso en modo claro/oscuro */
        u+.body {
            background-image: url('https://dummyimage.com/600x1200/000000/000000') !important;
        }

        /* Evitar que Gmail aclare u oscurezca los colores */
        @media (prefers-color-scheme: dark) {
            .text-force-white {
                color: #ffffff !important;
            }

            .text-force-red {
                color: #E50914 !important;
            }

            .text-force-gold {
                color: #FFD700 !important;
            }
        }

        /* Selectores específicos para el motor de Gmail */
        [data-ogsc] .text-force-white {
            color: #ffffff !important;
        }

        [data-ogsc] .text-force-red {
            color: #E50914 !important;
        }

        [data-ogsc] .text-force-gold {
            color: #FFD700 !important;
        }
    </style>
</head>

<body class="body" style="margin:0; padding:0; background-color:#000000; color:#ffffff;">

    <table width="100%" cellpadding="0" cellspacing="0" border="0"
        background="https://dummyimage.com/600x2000/000000/000000"
        style="background-color:#000000; background-image: url('https://dummyimage.com/600x2000/000000/000000'); background-size: cover; background-repeat: repeat; width:100% !important;">
        <tr>
            <td align="center" style="padding: 20px 0;">

                <!-- CONTENEDOR PRINCIPAL -->
                <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; width:100%;">
                    <tr>
                        <td align="center" style="padding:20px; font-family:Arial, sans-serif;">

                            <!-- FLYER DE EXTENSIÓN -->
                            <div
                                style="border: 2px solid #E50914; line-height: 0; box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);">
                                <img src="https://i.ibb.co/XfvF7P0/extended.png" alt="Membresía Extendida"
                                    style="width: 100%; height: auto; display: block;">
                            </div>

                            <h1 class="text-force-red"
                                style="color:#E50914 !important; margin:30px 0 10px 0; font-style: italic; font-weight: 900; text-transform: uppercase; font-size: 32px; line-height: 1.1;">
                                TIEMPO DE TRADING SUMADO ⚡
                            </h1>

                            <p class="text-force-white"
                                style="color:#ffffff !important; font-size: 18px; margin-top: 15px; font-weight: bold; line-height: 1.4;">
                                ¡Operación exitosa, <span class="text-force-gold"
                                    style="color:#FFD700 !important;">{{USER_NAME}}</span>!
                            </p>

                            <p class="text-force-white"
                                style="color:#ffffff !important; font-size: 15px; margin-top: 10px; line-height: 1.6;">
                                Hemos inyectado <span class="text-force-red"
                                    style="color:#E50914 !important; font-size: 22px; font-weight: 900;">{{DAYS_ADDED}}
                                    DÍAS</span> extra de acceso total a tu unidad.
                            </p>

                            <table width="100%" cellpadding="0" cellspacing="0" border="0"
                                background="https://dummyimage.com/600x400/000000/000000"
                                style="margin-top: 30px; background-color: #000000; border: 1px solid #333333;">
                                <tr>
                                    <td style="padding: 25px;" align="center">
                                        <p class="text-force-white"
                                            style="color:#888888 !important; font-weight: 900; margin: 0; letter-spacing: 2px; font-size: 12px; text-transform: uppercase;">
                                            NUEVO BALANCE DE TIEMPO:
                                        </p>
                                        <p class="text-force-gold"
                                            style="color:#FFD700 !important; font-size: 28px; font-weight: 900; margin-top: 10px; font-style: italic; letter-spacing: 1px;">
                                            {{NEW_EXPIRY}}
                                        </p>
                                    </td>
                                </tr>
                            </table>

                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
                                style="margin-top: 30px;">
                                <tr>
                                    <td align="center" bgcolor="#E50914"
                                        style="background-color:#E50914 !important; padding: 20px;">
                                        <a href="https://indexgeniusacademy.com" target="_blank"
                                            style="color:#ffffff !important; text-decoration:none; font-weight:900; text-transform:uppercase; letter-spacing:4px; font-size:16px; display:block; width:100%;">
                                            VOLVER AL PANEL DE CONTROL
                                        </a>
                                    </td>
                                </tr>
                            </table>

                            <p class="text-force-white"
                                style="color:#333333 !important; font-size: 9px; margin-top: 40px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold;">
                                IndexGenius Academy &copy; 2026 - Protocolo de Crecimiento Acelerado
                            </p>

                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

</body>

</html>
