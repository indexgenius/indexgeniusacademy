<!DOCTYPE html>

<head>

    <style>

        table,
        td,
        p,

        table,

            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }

        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
        }

        body {
            height: 100% !important;

            .dark-bg {

            .text-white {

            }
        }
    </style>
</head>
