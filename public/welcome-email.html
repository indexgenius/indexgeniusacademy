<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndexGenius Academy</title>
    <style>
        /* Reset for email clients */
        body,
        table,
        td,
        p,
        a,
        div {
            -ms-text-size-adjust: 100%;
            -webkit-text-size-adjust: 100%;
        }

        table,
        td {
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }

        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
        }

        body {
            height: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            background-color: #000000;
        }

        /* GMAIL DARK MODE HACKS */
        u+.body {
            background-color: #000000 !important;
            color: #ffffff !important;
        }

        @media (prefers-color-scheme: dark) {
            .dark-bg {
                background-color: #000000 !important;
            }

            .text-white {
                color: #ffffff !important;
            }
        }
    </style>
</head>

<body class="body" style="background-color: #000000; color: #ffffff; margin: 0; padding: 0;">

    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #000000;">
        <tr>
            <td align="center">

                <!-- MAIN CONTAINER: Full Flyer Focus -->
                <table border="0" cellpadding="0" cellspacing="0" width="600" style="max-width: 600px; width: 100%;">

                    <!-- THE FLYER IMAGE (The whole email is essentially this) -->
                    <tr>
                        <td align="center" style="line-height: 0;">
                            <img src="https://pub-c7a361632730477f8edb5a917dd41338.r2.dev/flyer_1772144420008_ChatGPT_Image_26_feb_2026%2C_04_31_24_p.m..png"
                                alt="Bienvenido a IndexGenius Academy"
                                style="width: 100%; max-width: 600px; height: auto; display: block; border: 0;">
                        </td>
                    </tr>

                    <!-- MINIMAL CREDENTIALS: Blended into the black background -->
                    <tr>
                        <td align="center" style="padding: 40px 20px; background-color: #000000;">
                            <p
                                style="margin: 0; font-family: Arial, sans-serif; font-size: 11px; color: #E50914; font-weight: 900; letter-spacing: 4px; text-transform: uppercase;">
                                ACCESO AUTORIZADO PARA:
                            </p>
                            <h2
                                style="margin: 10px 0 0 0; font-family: Arial, sans-serif; font-size: 24px; color: #ffffff; font-style: italic; font-weight: 900; text-transform: uppercase;">
                                {{USER_NAME}}
                            </h2>

                            <!-- INFO BOX: High contrast red border -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%"
                                style="margin-top: 30px; border: 1px solid #333333; background-color: #080808;">
                                <tr>
                                    <td style="padding: 25px;">
                                        <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                            <tr>
                                                <td style="padding-bottom: 10px;">
                                                    <span
                                                        style="font-family: Arial, sans-serif; font-size: 9px; color: #555; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;">USUARIO:</span>
                                                    <br>
                                                    <span
                                                        style="font-family: 'Courier New', Courier, monospace; font-size: 16px; color: #ffffff; font-weight: bold;">{{USER_EMAIL}}</span>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>
                                                    <span
                                                        style="font-family: Arial, sans-serif; font-size: 9px; color: #555; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;">PASSWORD:</span>
                                                    <br>
                                                    <span
                                                        style="font-family: 'Courier New', Courier, monospace; font-size: 16px; color: #E50914; font-weight: bold;">{{USER_PASSWORD}}</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>

                            <!-- ACTION BUTTON -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-top: 30px;">
                                <tr>
                                    <td align="center" bgcolor="#E50914"
                                        style="background-color: #E50914; padding: 20px;">
                                        <a href="https://indexgeniusacademy.com" target="_blank"
                                            style="font-family: Arial, sans-serif; font-size: 16px; font-weight: 900; color: #ffffff; text-decoration: none; text-transform: uppercase; letter-spacing: 4px; display: block;">
                                            INGRESAR AL SISTEMA
                                        </a>
                                    </td>
                                </tr>
                            </table>

                            <p
                                style="margin-top: 40px; font-family: Arial, sans-serif; font-size: 9px; color: #222; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;">
                                IndexGenius Academy &copy; 2026 - Official Transmission
                            </p>
                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

</body>

</html>
